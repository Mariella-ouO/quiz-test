<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小全互动测试</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f5f7fb;
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
}

.container{
  max-width:500px;
  width:100%;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.question{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.question p{
  font-weight:600;
  margin-bottom:10px;
}

label{
  display:block;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
  cursor:pointer;
  transition:0.2s;
}

label:hover{
  background:#f0f4ff;
}

input[type="radio"]{
  margin-right:10px;
}

textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ddd;
  resize:none;
  box-sizing:border-box;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#4f6df5;
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:#3e57d8;
}

/* 高亮选中的选项 */
input[type="radio"]:checked + span{
  background:#d6e0ff;
  border-color:#4f6df5;
}

/* 表单禁用效果 */
form.disabled{
  opacity:0.4;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="container">
<h1>小全互动测试</h1>

<form id="quiz">

<!-- 题目1 -->
<div class="question">
<p>1. 如果小全是企鹅，你是？</p>
<label><input type="radio" name="q1" value="小狗"><span>小狗</span></label>
<label><input type="radio" name="q1" value="小蛇"><span>小蛇</span></label>
<label><input type="radio" name="q1" value="小猫"><span>小猫</span></label>
<label><input type="radio" name="q1" value="小恐龙"><span>小恐龙</span></label>
<label><input type="radio" name="q1" value="小草"><span>小草</span></label>
<label><input type="radio" name="q1" value="小狮子"><span>小狮子</span></label>
<label><input type="radio" name="q1" value="拒绝福瑞"><span>拒绝福瑞</span></label>
</div>

<!-- 题目2 -->
<div class="question">
<p>2. 如果你有10颗巧克力，而小全有10块石头，你愿意交换多少巧克力和石头？</p>
<label><input type="radio" name="q2" value="换一块石头"><span>换一块石头</span></label>
<label><input type="radio" name="q2" value="换两块石头"><span>换两块石头</span></label>
<label><input type="radio" name="q2" value="直接把巧克力给她"><span>直接把巧克力给她</span></label>
<label><input type="radio" name="q2" value="抢夺她的石头并嘲讽（有风险）"><span>抢夺她的石头并嘲讽（有风险）</span></label>
</div>

<!-- 题目3 -->
<div class="question">
<p>3. 小全把巧克力和石头都吃掉了。最后，你有什么想对小全说的吗？</p>
<textarea name="q3" rows="4" placeholder="在这里写下你想说的话..."></textarea>
</div>

<button type="submit">提交</button>

</form>
</div>

<script>
const form = document.getElementById('quiz');

form.addEventListener('submit', function(e){
    e.preventDefault();
    e.stopPropagation();

    // 禁用表单
    form.classList.add('disabled');

    // 跳转到 success.html
    window.location.href = 'success.html';
});
</script>

</body>
</html>
