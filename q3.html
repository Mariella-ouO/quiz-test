<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问题3 - 小全互动测试</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#f5f7fb;margin:0;padding:20px;display:flex;justify-content:center;}
.container{max-width:500px;width:100%;}
h1{text-align:center;margin-bottom:30px;}
textarea{width:100%;padding:12px;border-radius:8px;border:1px solid #ddd;resize:none;box-sizing:border-box;font-size:16px;}
button{width:100%;padding:14px;border:none;border-radius:10px;background:#4f6df5;color:white;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px;}
button:hover{background:#3e57d8;}
</style>
</head>
<body>
<div class="container">
<h1>3. 小全把巧克力和石头都吃掉了。最后，你有什么想对小全说的吗？</h1>
<form id="q3Form">
<textarea name="q3" rows="4" placeholder="在这里写下你想说的话..." required></textarea>
<button type="submit">提交</button>
</form>
</div>

<script>
const form = document.getElementById('q3Form');
form.addEventListener('submit', async function(e){
    e.preventDefault();
    const q3 = form.q3.value.trim();
    if(!q3){alert('请填写内容'); return;}

    // 获取前两个答案
    const q1 = localStorage.getItem('q1') || '';
    const q2 = localStorage.getItem('q2') || '';

    const formData = new FormData();
    formData.append('q1', q1);
    formData.append('q2', q2);
    formData.append('q3', q3);

    try{
        await fetch('https://formspree.io/f/mzdjrqwe', {
            method: 'POST',
            body: formData,
            headers: {'Accept':'application/json'}
        });
    }catch(err){
        console.error('提交失败:', err);
    }

    localStorage.clear();
    window.location.href='success.html';
});
</script>
</body>
</html>
