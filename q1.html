<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问题1 - 小全互动测试</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#f5f7fb;margin:0;padding:20px;display:flex;justify-content:center;}
.container{max-width:500px;width:100%;}
h1{text-align:center;margin-bottom:30px;}
label{display:block;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd;cursor:pointer;transition:0.2s;}
label:hover{background:#f0f4ff;}
input[type="radio"]{margin-right:10px;}
input[type="radio"]:checked + span{background:#d6e0ff;border-color:#4f6df5;}
</style>
</head>
<body>
<div class="container">
<h1>1. 如果小全是企鹅，你是？</h1>
<form id="q1Form">
<label><input type="radio" name="q1" value="小狗"><span>小狗</span></label>
<label><input type="radio" name="q1" value="小蛇"><span>小蛇</span></label>
<label><input type="radio" name="q1" value="小猫"><span>小猫</span></label>
<label><input type="radio" name="q1" value="小恐龙"><span>小恐龙</span></label>
<label><input type="radio" name="q1" value="小草"><span>小草</span></label>
<label><input type="radio" name="q1" value="小狮子"><span>小狮子</span></label>
<label><input type="radio" name="q1" value="拒绝福瑞"><span>拒绝福瑞</span></label>
</form>
</div>

<script>
const form1 = document.getElementById('q1Form');
form1.addEventListener('change', function(){
    const selected = form1.q1.value;
    if(selected){
        localStorage.setItem('q1', selected);
        window.location.href = 'q2.html';
    }
});
</script>
</body>
</html>
