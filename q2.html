<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问题2 - 小全互动测试</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#f5f7fb;margin:0;padding:20px;display:flex;justify-content:center;}
.container{max-width:500px;width:100%;}
h1{text-align:center;margin-bottom:30px;}
label{display:block;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd;cursor:pointer;transition:0.2s;}
label:hover{background:#f0f4ff;}
input[type="radio"]{margin-right:10px;}
input[type="radio"]:checked + span{background:#d6e0ff;border-color:#4f6df5;}
</style>
</head>
<body>
<div class="container">
<h1>2. 如果你有10颗巧克力，而小全有10块石头，你愿意交换多少巧克力和石头？</h1>
<form id="q2Form">
<label><input type="radio" name="q2" value="换一块石头"><span>换一块石头</span></label>
<label><input type="radio" name="q2" value="换两块石头"><span>换两块石头</span></label>
<label><input type="radio" name="q2" value="直接把巧克力给她"><span>直接把巧克力给她</span></label>
<label><input type="radio" name="q2" value="抢夺她的石头并嘲讽（有风险）"><span>抢夺她的石头并嘲讽（有风险）</span></label>
</form>
</div>

<script>
const form = document.getElementById('q2Form');
form.addEventListener('change', function(e){
    const selected = form.q2.value;
    if(selected){
        localStorage.setItem('q2', selected);
        window.location.href = 'q3.html';
    }
});
</script>
</body>
</html>
