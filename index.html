<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小全互动测试</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f5f7fb;
  margin:0;
  padding:20px;
  display:flex;
  justify-content:center;
}

.container{
  max-width:500px;
  width:100%;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.question{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.question p{
  font-weight:600;
  margin-bottom:10px;
}

label{
  display:block;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ddd;
  cursor:pointer;
  transition:0.2s;
}

label:hover{
  background:#f0f4ff;
}

input[type="radio"]{
  margin-right:10px;
}

textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #ddd;
  resize:none;
  box-sizing:border-box;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#4f6df5;
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:#3e57d8;
}

#result{
  margin-top:20px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  color:#333;
  display:none !important; /* 强制初始隐藏 */
}

/* 高亮选中的选项 */
input[type="radio"]:checked + span{
  background:#d6e0ff;
  border-color:#4f6df5;
}
</style>
</head>

<body>

<div class="container">
<h1>小全互动测试</h1>

<form id="quiz">

<!-- 题目1 -->
<div class="question">
<p>1. 如果小全是企鹅，你是？</p>
<label><input type="radio" name="q1" value="小狗"><span>小狗</span></label>
<label><input type="radio" name="q1" value="小蛇"><span>小蛇</span></label>
<label><input type="radio" name="q1" value="小猫"><span>小猫</span></label>
<label><input type="radio" name="q1" value="小恐龙"><span>小恐龙</span></label>
<label><input type="radio" name="q1" value="小草"><span>小草</span></label>
<label><input type="radio" name="q1" value="小狮子"><span>小狮子</span></label>
<label><input type="radio" name="q1" value="拒绝福瑞"><span>拒绝福瑞</span></label>
</div>

<!-- 题目2 -->
<div class="question">
<p>2. 如果你有10颗巧克力，而小全有10块石头，你愿意交换多少巧克力和石头？</p>
<label><input type="radio" name="q2" value="换一块石头"><span>换一块石头</span></label>
<label><input type="radio" name="q2" value="换两块石头"><span>换两块石头</span></label>
<label><input type="radio" name="q2" value="直接把巧克力给她"><span>直接把巧克力给她</span></label>
<label><input type="radio" name="q2" value="抢夺她的石头并嘲讽（有风险）"><span>抢夺她的石头并嘲讽（有风险）</span></label>
</div>

<!-- 题目3 -->
<div class="question">
<p>3. 小全把巧克力和石头都吃掉了。最后，你有什么想对小全说的吗？</p>
<textarea name="q3" rows="4" placeholder="在这里写下你想说的话..."></textarea>
</div>

<button type="submit">提交</button>

</form>

<div id="result">提交成功！小全得到了巧克力，什么都没有留下。但你可以截屏这个页面到她的朋友圈底下互动</div>

</div>

<script>
// 确保初始隐藏 result
const result = document.getElementById('result');
result.style.display = 'none';

const form = document.getElementById('quiz');

form.addEventListener('submit', function(e){
    e.preventDefault();
    e.stopPropagation(); // 防止手机浏览器默认行为

    const data = new FormData(form);

    fetch('https://formspree.io/f/mzdjrqwe', {
        method:'POST',
        body:data,
        headers:{'Accept':'application/json'}
    })
    .then(resp=>{
        if(resp.ok){
            result.style.display='block';  // 显示自定义提示
            form.style.display='none';     // 隐藏表单
            window.scrollTo({top:0, behavior:'smooth'}); // 自动滚动到顶部
        }else{
            alert('提交失败，请稍后再试。');
        }
    })
    .catch(err=>{
        alert('提交失败，请检查网络');
    });
});
</script>

</body>
</html>
